<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carmelina Pharma Entregas</title>
<style>
:root{
  --verm:#C8102E;--verm-d:#8B0000;--verm-l:#FFE4E6;--verm-m:#fecaca;
  --ouro:#B8860B;--ouro-l:#FFF8E1;
  --verde:#059669;--azul:#1D4ED8;--laranja:#EA580C;--roxo:#7C3AED;
  --cinza:#6B7280;--cinza-l:#F9FAFB;--borda:#E5E7EB;--preto:#111827;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#FFF5F5;max-width:480px;margin:0 auto;min-height:100vh;overflow-x:hidden}
button,input,select,textarea{font-family:inherit}
button:active{transform:scale(.97)}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;background:linear-gradient(160deg,var(--verm-d),var(--verm),#e63950);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s}
#splash.hide{opacity:0;pointer-events:none}
.splash-vovo{animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.splash-titulo{color:white;font-size:30px;font-weight:900;font-family:Georgia,serif;margin-top:12px;letter-spacing:-1px}
.splash-sub{color:rgba(255,255,255,.8);font-size:13px;font-style:italic;margin-top:6px}
.splash-loading{margin-top:32px;display:flex;gap:8px}
.dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.6);animation:dots .8s infinite alternate}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes dots{to{background:white;transform:scale(1.3)}}

/* ── LOGIN ── */
#pg-login{min-height:100vh;background:linear-gradient(160deg,var(--verm-d),var(--verm),#e63950);display:none;flex-direction:column;align-items:center;padding:24px 20px 40px}
.login-hero{text-align:center;color:white;margin-bottom:24px;padding-top:16px}
.login-vovo{margin-bottom:8px}
.login-titulo{font-size:26px;font-weight:900;font-family:Georgia,serif;letter-spacing:-.5px}
.login-slogan{font-size:12px;opacity:.85;font-style:italic;margin-top:4px}
.login-card{background:white;border-radius:24px;padding:22px;width:100%;max-width:400px;box-shadow:0 24px 64px rgba(0,0,0,.3)}
.perfis-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.p-btn{padding:10px 8px;border-radius:12px;border:2px solid var(--borda);background:white;font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;color:var(--cinza)}
.p-btn.on{border-color:var(--verm);background:var(--verm-l);color:var(--verm)}
.modo-tabs{display:flex;background:#f3f4f6;border-radius:12px;padding:4px;margin-bottom:18px}
.m-tab{flex:1;padding:9px;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:#9ca3af;transition:all .2s}
.m-tab.on{background:white;color:var(--verm);box-shadow:0 2px 8px rgba(0,0,0,.1)}
.campo{margin-bottom:13px}
.campo label{font-size:11px;font-weight:700;color:#374151;display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.campo input,.campo select,.campo textarea{width:100%;padding:12px 14px;border:1.5px solid var(--borda);border-radius:10px;font-size:13px;transition:border .2s;background:white}
.campo input:focus,.campo select:focus,.campo textarea:focus{outline:none;border-color:var(--verm)}
.demo-hint{font-size:11px;color:var(--cinza);text-align:center;background:var(--verm-l);border-radius:8px;padding:8px 12px;margin-bottom:14px}
.btn-entrar{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:800;cursor:pointer;color:white;letter-spacing:.3px;transition:all .2s}
.bg-verm{background:linear-gradient(135deg,var(--verm-d),var(--verm))}
.bg-azul{background:linear-gradient(135deg,#1e40af,var(--azul))}
.bg-lrj{background:linear-gradient(135deg,#9a3412,var(--laranja))}
.bg-roxo{background:linear-gradient(135deg,#4c1d95,var(--roxo))}
.mem-login{color:rgba(255,255,255,.6);font-size:11px;font-style:italic;margin-top:20px;text-align:center}

/* ── APP SHELL ── */
#pg-app{display:none;flex-direction:column;min-height:100vh}
.app-header{padding:18px 20px 54px;color:white;position:relative}
.app-header-row{display:flex;justify-content:space-between;align-items:center}
.logo-row{display:flex;align-items:center;gap:10px}
.logo-vovo-sm{width:38px;height:38px}
.logo-nome{font-size:17px;font-weight:900;font-family:Georgia,serif;line-height:1}
.logo-sub{font-size:10px;opacity:.8;letter-spacing:.5px}
.h-btns{display:flex;gap:6px}
.h-btn{background:rgba(255,255,255,.2);border:none;color:white;border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer}
.h-alerta{background:rgba(0,0,0,.25);border-radius:10px;padding:8px 14px;margin-top:12px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}

.card-shell{margin:-36px 14px 0;background:white;border-radius:22px;box-shadow:0 8px 32px rgba(200,16,46,.12);overflow:hidden;min-height:520px}
.nav-bar{display:flex;border-bottom:1px solid #f3f4f6;overflow-x:auto;scrollbar-width:none}
.nav-bar::-webkit-scrollbar{display:none}
.n-tab{flex:0 0 auto;padding:13px 16px;border:none;background:none;cursor:pointer;font-size:10px;font-weight:700;color:#9ca3af;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s}
.n-tab.on{color:var(--verm);border-bottom-color:var(--verm)}
.n-tab.azul.on{color:var(--azul);border-bottom-color:var(--azul)}
.n-tab.lrj.on{color:var(--laranja);border-bottom-color:var(--laranja)}
.n-tab.rxo.on{color:var(--roxo);border-bottom-color:var(--roxo)}
.pg{padding:16px;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── COMPONENTES ── */
.card{background:white;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 12px rgba(0,0,0,.07);border:1px solid #f3f4f6}
.card.red{border:2px solid var(--verm);box-shadow:0 4px 20px rgba(200,16,46,.15)}
.hero-box{border-radius:18px;padding:22px;text-align:center;margin-bottom:16px}
.hero-red{background:linear-gradient(135deg,var(--verm-l),#ffe0e3);border:1px solid var(--verm-m)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:white;border-radius:14px;padding:14px 10px;text-align:center;border:2px solid var(--borda);cursor:pointer;transition:all .2s}
.kpi:active{transform:scale(.97)}
.kpi .ic{font-size:22px}
.kpi .vl{font-size:21px;font-weight:900;margin:2px 0}
.kpi .lb{font-size:9px;color:var(--cinza);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.linha{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f9fafb;font-size:13px}
.linha:last-child{border:none}
.linha .nm{color:#374151}
.linha .vl{font-weight:700}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700}
.tag-a{background:#ecfdf5;color:var(--verde)}
.tag-f{background:#fef2f2;color:#ef4444}
.tag-on{background:#ecfdf5;color:var(--verde);padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.tag-off{background:#fef2f2;color:#ef4444;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.med-pill{background:var(--verm-l);color:var(--verm-d);border-radius:8px;padding:3px 10px;font-size:11px;font-weight:600;display:inline-block;margin:2px}
.s-titulo{font-size:14px;font-weight:800;color:var(--preto);margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--verm-l)}
.vazio{text-align:center;padding:44px 20px;color:var(--cinza)}
.vazio .ic{font-size:48px;margin-bottom:10px}
.btn{border:none;border-radius:10px;font-size:13px;font-weight:800;cursor:pointer;color:white;padding:10px 18px;transition:all .2s}
.btn-full{width:100%;padding:14px;font-size:15px;border-radius:12px}
.btn-sm{padding:8px 14px;font-size:11px;border-radius:8px}
.bv{background:var(--verm)}.ba{background:var(--azul)}.bl{background:var(--laranja)}.bg{background:var(--verde)}.br{background:#ef4444}
.acoes{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.qtd-ctrl{display:flex;align-items:center;gap:18px;margin-top:6px}
.qtd-b{width:42px;height:42px;border-radius:11px;border:2px solid var(--verm-m);background:var(--verm-l);color:var(--verm);font-size:22px;font-weight:800;cursor:pointer}
.qtd-n{font-size:24px;font-weight:900;color:var(--verm);min-width:32px;text-align:center}
.stat-g{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{background:white;border-radius:12px;padding:14px;text-align:center;border:2px solid var(--borda)}
.stat .sv{font-size:26px;font-weight:900}
.stat .sl{font-size:10px;color:var(--cinza);font-weight:600;text-transform:uppercase}
.rota-ani{font-size:40px;text-align:center;animation:moto 1s ease-in-out infinite alternate}
@keyframes moto{from{transform:translateX(-6px)}to{transform:translateX(6px)}}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:13px 26px;border-radius:16px;font-size:13px;font-weight:700;color:white;box-shadow:0 8px 32px rgba(0,0,0,.25);z-index:9999;white-space:nowrap;animation:toastIn .3s ease;max-width:90vw;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
</style>
</head>

<script>
// ════════════════════════════════════════
// BANCO DE DADOS (substituir por Firebase/Supabase em produção)
// ════════════════════════════════════════
const DB = {
  farmacias:[
    {id:'f1',nome:'Farmácia Central Luziânia',cidade:'Luziânia',estado:'GO',telefone:'(61) 3621-0001',cnpj:'12.345.678/0001-00',endereco:'Rua das Flores, 123',aberta:true,avaliacao:4.8,senha:'farma123',meds:['Paracetamol 750mg','Ibuprofeno 400mg','Amoxicilina 500mg','Dipirona 500mg','Omeprazol 20mg','Losartana 50mg']},
    {id:'f2',nome:'Drogaria BemEstar DF',cidade:'Brasília',estado:'DF',telefone:'(61) 3200-2020',cnpj:'98.765.432/0001-00',endereco:'SCS Quadra 2, Bloco C',aberta:true,avaliacao:4.5,senha:'bem123',meds:['Metformina 850mg','Atorvastatina 20mg','Vitamina D 2000UI','Rivotril 2mg']},
    {id:'f3',nome:'Farmácia Popular Anápolis',cidade:'Anápolis',estado:'GO',telefone:'(62) 3310-0303',cnpj:'11.222.333/0001-00',endereco:'Av. Brasil Norte, 789',aberta:false,avaliacao:4.2,senha:'pop123',meds:['Vitamina C 1g','Zinco 50mg','Complexo B','Aspirina 100mg']},
  ],
  clientes:[
    {id:'c1',nome:'Maria Silva',telefone:'(61) 99999-0001',email:'maria@email.com',endereco:'Rua A, 10, Luziânia/GO',senha:'123456'},
  ],
  motoboys:[
    {id:'m1',nome:'João Moto',telefone:'(61) 98888-0001',cnh:'ABC123456',placa:'ABC-1D23',disponivel:true,avaliacao:4.9,corridas:142,senha:'moto123'},
    {id:'m2',nome:'Pedro Veloz',telefone:'(61) 98888-0002',cnh:'DEF789012',placa:'DEF-5E78',disponivel:false,avaliacao:4.7,corridas:89,senha:'moto456'},
  ],
  pedidos:[],
  nid:100
};

// ════════════════════════════════════════
// ESTADO GLOBAL
// ════════════════════════════════════════
let S={sessao:null,perfil:'cliente',modo:'entrar',aba:'inicio'};
let _fs='',_ms='',_qtd=1;

// ════════════════════════════════════════
// SPLASH
// ════════════════════════════════════════
setTimeout(()=>{
  document.getElementById('splash').classList.add('hide');
  setTimeout(()=>{
    document.getElementById('splash').style.display='none';
    document.getElementById('pg-login').style.display='flex';
    renderForm();
  },500);
},2200);

// ════════════════════════════════════════
// LOGIN
// ════════════════════════════════════════
function setPerfil(p,el){
  S.perfil=p;
  document.querySelectorAll('.p-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  renderForm();
}
function setModo(m,el){
  S.modo=m;
  document.querySelectorAll('.m-tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('btn-acao').textContent=m==='entrar'?'Entrar →':'Criar Conta Grátis';
  renderForm();
}
function renderForm(){
  const demos={cliente:'👤 Demo: maria@email.com / 123456',farmacia:'🏪 CNPJ: 12.345.678/0001-00 / farma123',motoboy:'🏍️ Tel: (61) 98888-0001 / moto123',admin:'⚙️ admin@carmelina.com / admin123'};
  document.getElementById('demo-box').textContent=S.modo==='entrar'?demos[S.perfil]:'';
  const p=S.perfil, e=S.modo==='entrar';
  let h='';
  const c=(id,lb,ph,tp='text')=>`<div class="campo"><label>${lb}</label><input id="f_${id}" type="${tp}" placeholder="${ph}" autocomplete="off"></div>`;
  if(e){
    if(p==='farmacia')h+=c('cnpj','CNPJ','00.000.000/0001-00');
    else if(p==='motoboy')h+=c('tel','Telefone','(00) 00000-0000','tel');
    else h+=c('email','E-mail','seu@email.com','email');
    h+=c('senha','Senha','••••••','password');
  } else {
    h+=c('nome','Nome Completo','Seu nome completo');
    h+=c('tel','Telefone','(00) 00000-0000','tel');
    h+=c('senha','Senha','Mínimo 6 caracteres','password');
    if(p==='cliente'){h+=c('email','E-mail','seu@email.com','email');h+=c('end','Endereço de Entrega','Rua, número, bairro, cidade/UF');}
    if(p==='farmacia'){h+=c('cnpj','CNPJ','00.000.000/0001-00');h+=c('cidade','Cidade','Ex: Luziânia');h+=c('estado','Estado (UF)','Ex: GO');h+=c('end','Endereço da Farmácia','Rua, número, bairro');}
    if(p==='motoboy'){h+=c('cnh','Número da CNH','000000000');h+=c('placa','Placa da Moto','ABC-1D23');}
  }
  document.getElementById('form-area').innerHTML=h;
}
const fv=id=>{const e=document.getElementById('f_'+id);return e?e.value.trim():''};

function acao(){
  if(S.modo==='cadastrar'){cadastrar();return;}
  const p=S.perfil;
  if(p==='admin'&&fv('email')==='admin@carmelina.com'&&fv('senha')==='admin123'){abrirApp({tipo:'admin',dados:{id:'adm',nome:'Administrador'}});return;}
  if(p==='cliente'){const u=DB.clientes.find(c=>c.email===fv('email')&&c.senha===fv('senha'));if(u){abrirApp({tipo:'cliente',dados:u});return;}}
  if(p==='farmacia'){const u=DB.farmacias.find(f=>f.cnpj===fv('cnpj')&&f.senha===fv('senha'));if(u){abrirApp({tipo:'farmacia',dados:u});return;}}
  if(p==='motoboy'){const u=DB.motoboys.find(m=>m.telefone===fv('tel')&&m.senha===fv('senha'));if(u){abrirApp({tipo:'motoboy',dados:u});return;}}
  toast('Dados incorretos. Tente novamente!','#ef4444');
}

function cadastrar(){
  const p=S.perfil,nome=fv('nome'),senha=fv('senha'),tel=fv('tel');
  if(!nome||!senha){toast('Preencha nome e senha','#ef4444');return;}
  if(senha.length<6){toast('Senha deve ter ao menos 6 caracteres','#ef4444');return;}
  if(p==='cliente'){
    const email=fv('email');
    if(!email){toast('E-mail obrigatório','#ef4444');return;}
    if(DB.clientes.find(c=>c.email===email)){toast('E-mail já cadastrado!','#ef4444');return;}
    const u={id:'c'+Date.now(),nome,email,telefone:tel,endereco:fv('end'),senha};
    DB.clientes.push(u);abrirApp({tipo:'cliente',dados:u});
  } else if(p==='farmacia'){
    const cnpj=fv('cnpj');
    if(!cnpj){toast('CNPJ obrigatório','#ef4444');return;}
    const u={id:'f'+Date.now(),nome,cidade:fv('cidade'),estado:fv('estado'),telefone:tel,cnpj,endereco:fv('end'),aberta:true,avaliacao:5.0,senha,meds:[]};
    DB.farmacias.push(u);abrirApp({tipo:'farmacia',dados:u});
  } else if(p==='motoboy'){
    const cnh=fv('cnh'),placa=fv('placa');
    if(!cnh||!placa){toast('CNH e placa obrigatórios','#ef4444');return;}
    const u={id:'m'+Date.now(),nome,telefone:tel,cnh,placa,disponivel:true,avaliacao:5.0,corridas:0,senha};
    DB.motoboys.push(u);abrirApp({tipo:'motoboy',dados:u});
  }
  toast('Bem-vindo à família Carmelina! 💊');
}

function filtFarms(v){
  document.querySelectorAll('#lista-f .card').forEach(el=>{

}
function selFarm(id){_fs=id;_ms='';_qtd=1;irAba('pedido');}

function enviarPedido(){
  let med=_ms==='outro'?(document.getElementById('mc')?.value?.trim()||''):_ms;
  const end=document.getElementById('end-e')?.value?.trim()||'';
  const obs=document.getElementById('obs-e')?.value?.trim()||'';
  if(!_fs||!med){toast('Selecione farmácia e medicamento','#ef4444');return;}
  if(!end){toast('Informe o endereço de entrega','#ef4444');return;}
  const farm=DB.farmacias.find(f=>f.id===_fs);
  DB.pedidos.unshift({id:'#'+(++DB.nid),clienteId:S.sessao.dados.id,clienteNome:S.sessao.dados.nome,clienteTel:S.sessao.dados.telefone||'',farmaciaId:_fs,farmaciaNome:farm.nome,medicamento:med,quantidade:_qtd,obs,enderecoEntrega:end,status:'Aguardando Farmácia',ts:Date.now(),motoboyId:null,motoboyNome:null});
  _fs='';_ms='';_qtd=1;
  toast('Pedido enviado! Carmelina já sabe 💊');
  irAba('pedidos');
}

    (farm.meds||[]).forEach(m=>{
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--cinza-l);border-radius:11px;margin-bottom:8px">
        <span style="font-size:13px;font-weight:600">💊 ${m}</span>
        <button onclick="remMed('${m}')" style="background:none;border:none;color:#ef4444;font-size:20px;cursor:pointer;font-weight:900">×</button>
      </div>`;
    });
  }
  else if(S.aba==='historico'){
    h=`<div class="stat-g">
      <div class="stat"><div class="sv" style="color:var(--azul)">${todos.length}</div><div class="sl">Total</div></div>
      <div class="stat"><div class="sv" style="color:var(--verde)">${todos.filter(p=>p.status==='Entregue').length}</div><div class="sl">Entregues</div></div>
      <div class="stat"><div class="sv" style="color:#ef4444">${todos.filter(p=>p.status==='Cancelado').length}</div><div class="sl">Cancelados</div></div>
      <div class="stat"><div class="sv" style="color:var(--laranja)">${ativos.length}</div><div class="sl">Em Andamento</div></div>
    </div>`;
    const hist=todos.filter(p=>['Entregue','Cancelado'].includes(p.status));
    if(!hist.length)h+=`<div class="vazio"><div class="ic">📊</div><div>Sem histórico ainda</div></div>`;
    hist.slice(0,15).forEach(p=>{
      h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700">💊 ${p.medicamento} (x${p.quantidade})</div><div style="font-size:11px;color:var(--cinza)">👤 ${p.clienteNome} · ${dtFmt(p.ts)}</div></div>${bStatus(p.status)}</div></div>`;
    });
  }
  document.getElementById('pg').innerHTML=h;
}
function toggleAberta(){const f=DB.farmacias.find(x=>x.id===S.sessao.dados.id);if(f){f.aberta=!f.aberta;toast(f.aberta?'Farmácia aberta! 🟢':'Farmácia fechada 🔴');}render();}
function addMed(){const v=document.getElementById('nm')?.value?.trim();if(!v)return;const f=DB.farmacias.find(x=>x.id===S.sessao.dados.id);if(f){f.meds=f.meds||[];if(!f.meds.includes(v)){f.meds.push(v);toast('Medicamento adicionado! 💊');renderPg();}else toast('Já cadastrado','#f59e0b');}}
function remMed(m){const f=DB.farmacias.find(x=>x.id===S.sessao.dados.id);if(f){f.meds=f.meds.filter(x=>x!==m);renderPg();}}

// ════════════════════════════════════════
// MOTOBOY
// ════════════════════════════════════════
function pgMotoboy(){
  const d=S.sessao.dados;
  const moto=DB.motoboys.find(m=>m.id===d.id)||d;
  const disp=DB.pedidos.filter(p=>p.status==='Aguardando Motoboy');
  const meus=DB.pedidos.filter(p=>p.motoboyId===moto.id).sort((a,b)=>b.ts-a.ts);
  const emRota=meus.filter(p=>p.status==='Em Rota de Entrega');
  let h='';

  if(S.aba==='disponiveis'){
    if(!moto.disponivel)h+=`<div style="background:#fef2f2;border:1.5px solid #fecaca;border-radius:14px;padding:14px;text-align:center;margin-bottom:14px;color:#dc2626;font-weight:700">🔴 Você está Offline!<br><small style="font-weight:400">Toque em "Offline" no topo para ficar Online</small></div>`;
    if(!disp.length)h+=`<div class="vazio"><div class="ic">🛵</div><div>Nenhum pedido disponível agora</div></div>`;
    disp.forEach(p=>{
      h+=`<div class="card red">
        <div style="font-size:15px;font-weight:800;margin-bottom:8px">💊 ${p.medicamento} (x${p.quantidade})</div>
        <div style="font-size:12px;color:var(--cinza)">🏪 Buscar em: <strong>${p.farmaciaNome}</strong></div>
        <div style="font-size:13px;font-weight:700;color:var(--preto);margin-top:4px">📍 Entregar em: ${p.enderecoEntrega}</div>
        <div style="font-size:12px;color:var(--cinza)">👤 ${p.clienteNome}${p.clienteTel?' · '+p.clienteTel:''}</div>
        ${p.obs?`<div style="font-size:12px;color:var(--cinza)">💬 ${p.obs}</div>`:''}
        <button class="btn btn-full bl" style="margin-top:12px" onclick="aceitar('${p.id}')" ${!moto.disponivel?'disabled style="opacity:.4"':''}>🏍️ Aceitar Esta Entrega</button>
      </div>`;
    });
  }
  else if(S.aba==='emrota'){
    if(!emRota.length)h=`<div class="vazio"><div class="ic">🏍️</div><div>Nenhuma entrega em rota agora</div></div>`;
    emRota.forEach(p=>{
      h+=`<div class="card" style="border:2px solid var(--laranja)">
        <div class="rota-ani">🏍️</div>
        <div style="text-align:center;font-weight:800;color:var(--laranja);font-size:15px;margin-bottom:12px">Você está em rota!</div>
        <div style="font-size:15px;font-weight:800">💊 ${p.medicamento} (x${p.quantidade})</div>
        <div style="font-size:12px;color:var(--cinza)">🏪 Saindo de: ${p.farmaciaNome}</div>
        <div style="font-size:14px;font-weight:800;color:var(--preto);margin:6px 0">📍 ${p.enderecoEntrega}</div>
        <div style="font-size:12px;color:var(--cinza)">👤 ${p.clienteNome}${p.clienteTel?' · 📞 '+p.clienteTel:''}</div>
        <button class="btn btn-full bg" style="margin-top:14px" onclick="entregar('${p.id}')">✅ Confirmar Entrega Realizada</button>
      </div>`;
    });
  }
  else if(S.aba==='historico'){
    h=`<div class="stat-g">
      <div class="stat"><div class="sv" style="color:var(--laranja)">${moto.corridas}</div><div class="sl">Corridas Feitas</div></div>
      <div class="stat"><div class="sv" style="color:#f59e0b">⭐${moto.avaliacao}</div><div class="sl">Avaliação</div></div>
    </div>`;
    const hist=meus.filter(p=>p.status==='Entregue');
    if(!hist.length)h+=`<div class="vazio"><div class="ic">📊</div><div>Sem histórico ainda</div></div>`;
    hist.forEach(p=>{h+=`<div class="card"><div style="font-size:13px;font-weight:700">💊 ${p.medicamento}</div><div style="font-size:12px;color:var(--cinza)">📍 ${p.enderecoEntrega} · ${dtFmt(p.ts)}</div>${bStatus(p.status)}</div>`;});
  }
  document.getElementById('pg').innerHTML=h;
}
function toggleDisp(){const m=DB.motoboys.find(x=>x.id===S.sessao.dados.id);if(m){m.disponivel=!m.disponivel;toast(m.disponivel?'Você está Online! 🟢':'Você está Offline 🔴');}render();}
function aceitar(id){
  const moto=DB.motoboys.find(m=>m.id===S.sessao.dados.id);
  if(!moto?.disponivel){toast('Fique Online primeiro!','#ef4444');return;}
  upd(id,'Em Rota de Entrega',{motoboyId:moto.id,motoboyNome:moto.nome});
  moto.disponivel=false;
  toast('Pedido aceito! Bora buscar o remédio 🏍️');
  irAba('emrota');
}
function entregar(id){
  const moto=DB.motoboys.find(m=>m.id===S.sessao.dados.id);
  upd(id,'Entregue');
  if(moto){moto.disponivel=true;moto.corridas=(moto.corridas||0)+1;}
  toast('Entrega concluída! Obrigada Carmelina! ⭐');
  irAba('disponiveis');
}

        <circle cx="50" cy="62" r="3.5" fill="#4A2F1A"/>
        <circle cx="70" cy="62" r="3.5" fill="#4A2F1A"/>
        <circle cx="40" cy="68" r="5" fill="#FFB6C1" opacity=".7"/>
        <circle cx="80" cy="68" r="5" fill="#FFB6C1" opacity=".7"/>

      <div style="font-size:11px;color:var(--cinza);font-style:italic">Carmelina Pharma Entregas</div>
    </div>
    <div class="stat-g">
      <div class="stat"><div class="sv" style="color:var(--azul)">${DB.farmacias.length}</div><div class="sl">🏪 Farmácias<br><small>${DB.farmacias.filter(f=>f.aberta).length} abertas</small></div></div>
      <div class="stat"><div class="sv" style="color:var(--laranja)">${DB.motoboys.length}</div><div class="sl">🏍️ Motoboys<br><small>${DB.motoboys.filter(m=>m.disponivel).length} online</small></div></div>
      <div class="stat"><div class="sv" style="color:var(--verm)">${DB.clientes.length}</div><div class="sl">👥 Clientes</div></div>
      <div class="stat"><div class="sv" style="color:var(--roxo)">${DB.pedidos.length}</div><div class="sl">📦 Pedidos</div></div>
      <div class="stat"><div class="sv" style="color:var(--verde)">${DB.pedidos.filter(p=>p.status==='Entregue').length}</div><div class="sl">✅ Entregues</div></div>
      <div class="stat"><div class="sv" style="color:var(--laranja)">${DB.pedidos.filter(p=>p.status==='Em Rota de Entrega').length}</div><div class="sl">🏍️ Em Rota</div></div>

    DB.pedidos.slice(0,5).forEach(p=>{h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:13px;font-weight:700">💊 ${p.medicamento}</div><div style="font-size:11px;color:var(--cinza)">${p.clienteNome} → ${p.farmaciaNome}</div></div>${bStatus(p.status)}</div></div>`;});

// ════════════════════════════════════════
// UTILS
// ════════════════════════════════════════
function upd(id,status,extra={}){
  const p=DB.pedidos.find(x=>x.id===id);
  if(p)Object.assign(p,{status,...extra});
  const msgs={'Pedido Confirmado':'Pedido confirmado! ✅','Aguardando Motoboy':'Chamando motoboy! 🏍️','Cancelado':'Pedido cancelado ❌','Entregue':'Entregue com sucesso! 🎉'};
  toast(msgs[status]||'Atualizado!',status==='Cancelado'?'#ef4444':undefined);
  render();
}
function cPedido(p){
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-size:11px;color:var(--cinza)">${p.id} · ${dtFmt(p.ts)}</span>${bStatus(p.status)}
  </div>
  <div style="font-size:15px;font-weight:800">💊 ${p.medicamento} (x${p.quantidade})</div>
  <div style="font-size:12px;color:var(--cinza)">🏪 ${p.farmaciaNome}</div>
  <div style="font-size:12px;color:var(--cinza)">📍 ${p.enderecoEntrega}</div>
  ${p.motoboyNome?`<div style="font-size:12px;color:var(--laranja)">🏍️ ${p.motoboyNome}</div>`:''}
  ${p.obs?`<div style="font-size:12px;color:var(--cinza)">💬 ${p.obs}</div>`:''}`;
}
const SC={'Aguardando Farmácia':'#f59e0b','Pedido Confirmado':'#3b82f6','Aguardando Motoboy':'#8b5cf6','Em Rota de Entrega':'#EA580C','Entregue':'#059669','Cancelado':'#ef4444'};
const SI={'Aguardando Farmácia':'⏳','Pedido Confirmado':'✅','Aguardando Motoboy':'🔍','Em Rota de Entrega':'🏍️','Entregue':'🎉','Cancelado':'❌'};
function bStatus(s){const c=SC[s]||'#6b7280';return`<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}40">${SI[s]||''} ${s}</span>`;}
function dtFmt(ts){return new Date(ts).toLocaleDateString('pt-BR');}
function toast(msg,bg='#C8102E'){
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div');
  t.className='toast';t.style.background=bg;t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3200);
}
</script>
